<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور — استوديو البودكاست</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0d0d14!important;min-height:100vh;}
body{font-family:'Noto Kufi Arabic',sans-serif;direction:rtl;color:#e2ddd4;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/babel">
const {useState,useEffect}=React;
const SB_URL="https://qawyirrrprjcklwxgzqu.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhd3lpcnJycHJqY2tsd3hnenF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDMxNDEsImV4cCI6MjA5MzcxOTE0MX0.y7TJ0WPiYXa5JwphGuYdj8O8B_D7eZz8Fo53H27j7O8";
const sb=supabase.createClient(SB_URL,SB_KEY);
const T={bg:"#0d0d14",sur:"#13131e",car:"#1a1a28",brd:"#252535",acc:"#c8a050",tx:"#e2ddd4",tx2:"#8a8599",ok:"#3d9e6f",err:"#c05040"};
const IS={width:"100%",background:T.bg,border:"1px solid #252535",borderRadius:"8px",padding:"12px 14px",color:"#e2ddd4",fontFamily:"'Noto Kufi Arabic',sans-serif",fontSize:"14px",outline:"none",boxSizing:"border-box"};

const App=()=>{
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[pw2,setPw2]=useState("");
  const[busy,setBusy]=useState(false);
  const[step,setStep]=useState("request");
  const[msgText,setMsgText]=useState("");
  const[msgType,setMsgType]=useState("ok");

  const showMsg=(text,type)=>{setMsgText(text);setMsgType(type||"ok");};

  useEffect(function(){
    sb.auth.onAuthStateChange(function(event,session){
      if(event==="PASSWORD_RECOVERY"){
        setStep("reset");
      }
    });
    var hash=window.location.hash;
    if(hash&&hash.indexOf("access_token")>-1){
      var params=new URLSearchParams(hash.substring(1));
      var at=params.get("access_token");
      var rt=params.get("refresh_token")||"";
      if(at){
        sb.auth.setSession({access_token:at,refresh_token:rt}).then(function(res){
          if(!res.error&&res.data&&res.data.session){
            setStep("reset");
          }
        });
      }
    }
  },[]);

  const requestReset=async()=>{
    if(!email.trim())return;
    setBusy(true);showMsg("","ok");
    var res=await sb.auth.resetPasswordForEmail(email.trim(),{
      redirectTo:"https://www.mypcstudio.com/reset-password"
    });
    if(res.error){
      showMsg("حدث خطأ — تأكد من البريد وحاول مجدداً","error");
    } else {
      showMsg("✓ تم الإرسال — تحقق من بريدك وافتح رابط إعادة التعيين","ok");
    }
    setBusy(false);
  };

  const savePassword=async()=>{
    if(pw.length<6){showMsg("كلمة المرور يجب أن تكون 6 أحرف على الأقل","error");return;}
    if(pw!==pw2){showMsg("كلمتا المرور غير متطابقتين","error");return;}
    setBusy(true);showMsg("","ok");
    var res=await sb.auth.updateUser({password:pw});
    if(res.error){
      showMsg("خطأ: "+res.error.message,"error");
    } else {
      showMsg("✓ تم تغيير كلمة المرور بنجاح","ok");
      setTimeout(function(){window.location.href="/";},2000);
    }
    setBusy(false);
  };

  return(
    React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:"#0d0d14"}},
      React.createElement("div",{style:{width:"100%",maxWidth:"400px"}},
        React.createElement("div",{style:{textAlign:"center",marginBottom:"36px"}},
          React.createElement("div",{style:{display:"inline-flex",alignItems:"center",gap:"8px",background:"#13131e",border:"1px solid #252535",borderRadius:"100px",padding:"5px 16px",marginBottom:"16px"}},
            React.createElement("div",{style:{width:"6px",height:"6px",borderRadius:"50%",background:"#c8a050",boxShadow:"0 0 8px #c8a050"}}),
            React.createElement("span",{style:{color:"#8a8599",fontSize:"11px",letterSpacing:"0.13em"}},"PODCAST STUDIO")
          ),
          React.createElement("div",{style:{fontSize:"22px",fontWeight:"700",color:"#e2ddd4",marginBottom:"6px"}},
            step==="reset"?"أدخل كلمة المرور الجديدة":"إعادة تعيين كلمة المرور"
          ),
          React.createElement("div",{style:{color:"#8a8599",fontSize:"13px"}},
            step==="reset"?"اختر كلمة مرور جديدة لحسابك":"سنرسل لك رابط إعادة التعيين"
          )
        ),
        React.createElement("div",{style:{background:"#1a1a28",border:"1px solid #252535",borderRadius:"12px",padding:"24px"}},
          msgText&&React.createElement("div",{style:{padding:"10px 14px",borderRadius:"8px",fontSize:"13px",marginBottom:"16px",background:(msgType==="ok"?"#3d9e6f":"#c05040")+"20",border:"1px solid "+(msgType==="ok"?"#3d9e6f":"#c05040")+"40",color:msgType==="ok"?"#3d9e6f":"#e07060"}},msgText),
          step==="request"&&React.createElement(React.Fragment,null,
            React.createElement("div",{style:{marginBottom:"20px"}},
              React.createElement("div",{style:{fontSize:"11px",color:"#8a8599",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"8px"}},"البريد الإلكتروني"),
              React.createElement("input",{type:"email",value:email,onChange:function(e){setEmail(e.target.value);},placeholder:"بريدك المسجّل في الأداة",style:{...IS,direction:"ltr"},onFocus:function(e){e.target.style.borderColor="#c8a050";},onBlur:function(e){e.target.style.borderColor="#252535";}})
            ),
            React.createElement("button",{onClick:requestReset,disabled:!email.trim()||busy,style:{width:"100%",background:"#c8a050",border:"none",borderRadius:"8px",padding:"13px",fontFamily:"'Noto Kufi Arabic',sans-serif",fontWeight:"700",fontSize:"14px",color:"#0d0d14",cursor:busy||!email.trim()?"not-allowed":"pointer",opacity:busy||!email.trim()?0.5:1}},busy?"جارٍ الإرسال...":"إرسال رابط إعادة التعيين"),
            React.createElement("div",{style:{marginTop:"16px",textAlign:"center"}},
              React.createElement("a",{href:"/",style:{color:"#8a8599",fontSize:"12px",textDecoration:"none"}},"← العودة لتسجيل الدخول")
            )
          ),
          step==="reset"&&React.createElement(React.Fragment,null,
            React.createElement("div",{style:{marginBottom:"16px"}},
              React.createElement("div",{style:{fontSize:"11px",color:"#8a8599",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"8px"}},"كلمة المرور الجديدة"),
              React.createElement("input",{type:"password",value:pw,onChange:function(e){setPw(e.target.value);},placeholder:"••••••••",style:{...IS,direction:"ltr"},onFocus:function(e){e.target.style.borderColor="#c8a050";},onBlur:function(e){e.target.style.borderColor="#252535";}})
            ),
            React.createElement("div",{style:{marginBottom:"20px"}},
              React.createElement("div",{style:{fontSize:"11px",color:"#8a8599",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"8px"}},"تأكيد كلمة المرور"),
              React.createElement("input",{type:"password",value:pw2,onChange:function(e){setPw2(e.target.value);},placeholder:"••••••••",style:{...IS,direction:"ltr"},onFocus:function(e){e.target.style.borderColor="#c8a050";},onBlur:function(e){e.target.style.borderColor="#252535";}})
            ),
            React.createElement("button",{onClick:savePassword,disabled:!pw||!pw2||busy,style:{width:"100%",background:"#c8a050",border:"none",borderRadius:"8px",padding:"13px",fontFamily:"'Noto Kufi Arabic',sans-serif",fontWeight:"700",fontSize:"14px",color:"#0d0d14",cursor:busy||!pw||!pw2?"not-allowed":"pointer",opacity:busy||!pw||!pw2?0.5:1}},busy?"جارٍ الحفظ...":"حفظ كلمة المرور الجديدة")
          )
        )
      )
    )
  );
};
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
