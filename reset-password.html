<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور — استوديو البودكاست</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0d0d14!important;min-height:100vh;}
body{font-family:'Noto Kufi Arabic',sans-serif;direction:rtl;color:#e2ddd4;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/babel">
const {useState,useEffect}=React;
const SB_URL="https://qawyirrrprjcklwxgzqu.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhd3lpcnJycHJqY2tsd3hnenF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDMxNDEsImV4cCI6MjA5MzcxOTE0MX0.y7TJ0WPiYXa5JwphGuYdj8O8B_D7eZz8Fo53H27j7O8";
const sb=supabase.createClient(SB_URL,SB_KEY);

const T={bg:"#0d0d14",sur:"#13131e",car:"#1a1a28",brd:"#252535",acc:"#c8a050",tx:"#e2ddd4",tx2:"#8a8599",ok:"#3d9e6f",err:"#c05040"};
const IS={width:"100%",background:T.bg,border:`1px solid ${T.brd}`,borderRadius:"8px",padding:"12px 14px",color:T.tx,fontFamily:"'Noto Kufi Arabic',sans-serif",fontSize:"14px",outline:"none",boxSizing:"border-box"};

const App=()=>{
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[pw2,setPw2]=useState("");
  const[busy,setBusy]=useState(false);
  const[msg,setMsg]=useState({text:"",type:"ok"});
  const[step,setStep]=useState("request");
  const[sessionReady,setSessionReady]=useState(false);

  useEffect(()=>{
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==="PASSWORD_RECOVERY"){
      setSessionReady(true);
      setStep("reset");
    }
  });

  // تحقق من الـ hash في الرابط
  const hash=window.location.hash;
  if(hash&&hash.includes("access_token")){
    const params=new URLSearchParams(hash.substring(1));
    const accessToken=params.get("access_token");
    const refreshToken=params.get("refresh_token")||"";
    if(accessToken){
      sb.auth.setSession({access_token:accessToken,refresh_token:refreshToken})
        .then(({data,error})=>{
          if(!error&&data?.session){
            setSessionReady(true);
            setStep("reset");
          }
        });
    }
  }
},[]);

    if(accessToken&&type==="recovery"){
      sb.auth.setSession({access_token:accessToken,refresh_token:params.get("refresh_token")||""})
        .then(({data,error})=>{
          if(!error&&data.session){
            setSessionReady(true);
            setStep("reset");
          }
        });
    }

    sb.auth.onAuthStateChange((event,session)=>{
      if(event==="PASSWORD_RECOVERY"&&session){
        setSessionReady(true);
        setStep("reset");
      }
    });
  },[]);

  const requestReset=async()=>{
    if(!email.trim())return;
    setBusy(true);setMsg({text:"",type:"ok"});
    const{error}=await sb.auth.resetPasswordForEmail(email.trim(),{
      redirectTo:"https://www.mypcstudio.com/reset-password"
    });
    if(error){
      setMsg({text:"حدث خطأ — تأكد من البريد وحاول مجدداً",type:"error"});
    } else {
      setMsg({text:"✓ تم الإرسال — تحقق من بريدك وافتح رابط إعادة التعيين",type:"ok"});
    }
    setBusy(false);
  };

  const savePassword=async()=>{
    if(pw.length<6){setMsg({text:"كلمة المرور يجب أن تكون 6 أحرف على الأقل",type:"error"});return;}
    if(pw!==pw2){setMsg({text:"كلمتا المرور غير متطابقتين",type:"error"});return;}
    setBusy(true);setMsg({text:"",type:"ok"});
    const{error}=await sb.auth.updateUser({password:pw});
    if(error){
      setMsg({text:"انتهت الجلسة — اطلب رابطاً جديداً",type:"error"});
    } else {
      setMsg({text:"✓ تم تغيير كلمة المرور بنجاح — سيتم توجيهك للأداة",type:"ok"});
      setTimeout(()=>window.location.href="/",2000);
    }
    setBusy(false);
  };

  const MsgBox=()=>msg.text?(<div style={{padding:"10px 14px",borderRadius:"8px",fontSize:"13px",marginBottom:"16px",background:(msg.type==="ok"?T.ok:T.err)+"20",border:`1px solid ${msg.type==="ok"?T.ok:T.err}40`,color:msg.type==="ok"?T.ok:"#e07060"}}>{msg.text}</div>):null;

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:T.bg}}>
      <div style={{width:"100%",maxWidth:"400px"}}>
        <div style={{textAlign:"center",marginBottom:"36px"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:"8px",background:T.sur,border:`1px solid ${T.brd}`,borderRadius:"100px",padding:"5px 16px",marginBottom:"16px"}}>
            <div style={{width:"6px",height:"6px",borderRadius:"50%",background:T.acc,boxShadow:`0 0 8px ${T.acc}`}}/>
            <span style={{color:T.tx2,fontSize:"11px",letterSpacing:"0.13em"}}>PODCAST STUDIO</span>
          </div>
          <div style={{fontSize:"22px",fontWeight:"700",color:T.tx,marginBottom:"6px"}}>
            {step==="reset"?"أدخل كلمة المرور الجديدة":"إعادة تعيين كلمة المرور"}
          </div>
          <div style={{color:T.tx2,fontSize:"13px"}}>
            {step==="reset"?"اختر كلمة مرور جديدة لحسابك":"سنرسل لك رابط إعادة التعيين على بريدك"}
          </div>
        </div>

        <div style={{background:T.car,border:`1px solid ${T.brd}`,borderRadius:"12px",padding:"24px"}}>
          <MsgBox/>

          {step==="request"&&(
            <>
              <div style={{marginBottom:"20px"}}>
                <div style={{fontSize:"11px",color:T.tx2,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"8px"}}>البريد الإلكتروني</div>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&requestReset()} placeholder="بريدك المسجّل في الأداة" style={{...IS,direction:"ltr"}} onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.brd}/>
              </div>
              <button onClick={requestReset} disabled={!email.trim()||busy} style={{width:"100%",background:T.acc,border:"none",borderRadius:"8px",padding:"13px",fontFamily:"'Noto Kufi Arabic',sans-serif",fontWeight:"700",fontSize:"14px",color:"#0d0d14",cursor:busy||!email.trim()?"not-allowed":"pointer",opacity:busy||!email.trim()?0.5:1}}>
                {busy?"جارٍ الإرسال...":"إرسال رابط إعادة التعيين"}
              </button>
              <div style={{marginTop:"16px",textAlign:"center"}}>
                <a href="/" style={{color:T.tx2,fontSize:"12px",textDecoration:"none"}}>← العودة لتسجيل الدخول</a>
              </div>
            </>
          )}

          {step==="reset"&&(
            <>
              <div style={{marginBottom:"16px"}}>
                <div style={{fontSize:"11px",color:T.tx2,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"8px"}}>كلمة المرور الجديدة</div>
                <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" style={{...IS,direction:"ltr"}} onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.brd}/>
              </div>
              <div style={{marginBottom:"20px"}}>
                <div style={{fontSize:"11px",color:T.tx2,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"8px"}}>تأكيد كلمة المرور</div>
                <input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="••••••••" style={{...IS,direction:"ltr"}} onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.brd}/>
              </div>
              <button onClick={savePassword} disabled={!pw||!pw2||busy} style={{width:"100%",background:T.acc,border:"none",borderRadius:"8px",padding:"13px",fontFamily:"'Noto Kufi Arabic',sans-serif",fontWeight:"700",fontSize:"14px",color:"#0d0d14",cursor:busy||!pw||!pw2?"not-allowed":"pointer",opacity:busy||!pw||!pw2?0.5:1}}>
                {busy?"جارٍ الحفظ...":"حفظ كلمة المرور الجديدة"}
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
};
ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
