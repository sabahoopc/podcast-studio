// ── Usage ──────────────────────────────────────────────────────────────────
const getUsage = async (userId) => {
  const { data } = await sb.from("usage").select("*").eq("user_id",userId).single();
  if(!data){await sb.from("usage").insert({user_id:userId});return{episodes_used:0,plan:"free",credits:0};}
  return data;
};

const getEffectiveLimit = (usage) => {
  if(!usage) return PLANS.free;
  const plan = usage.plan || "free";
  if(plan === "beta"){
    if(usage.beta_expires_at && new Date(usage.beta_expires_at) < new Date()) return PLANS.free;
    return PLANS.beta;
  }
  return PLANS[plan] || PLANS.free;
};
const isPro2 = (usage) => usage?.plan === "pro2";

const canGenerate = (usage) => {
  if(!usage) return false;
  const limit = getEffectiveLimit(usage);
  const credits = usage.credits || 0;
  return usage.episodes_used < limit || credits > 0;
};

const incrementUsage = async (userId, usage) => {
  const limit = getEffectiveLimit(usage);
  const useCredit = usage.episodes_used >= limit && (usage.credits || 0) > 0;
  if(useCredit){
    await sb.from("usage").update({credits:(usage.credits||0)-1,updated_at:new Date().toISOString()}).eq("user_id",userId);
  } else {
    await sb.from("usage").update({episodes_used:(usage.episodes_used||0)+1,updated_at:new Date().toISOString()}).eq("user_id",userId);
  }
};

const resetIfNewMonth = async (userId) => {
  const{data}=await sb.from("usage").select("updated_at,plan").eq("user_id",userId).single();
  if(!data||data.plan==="beta")return;
  const last=new Date(data.updated_at),now=new Date();
  if(last.getMonth()!==now.getMonth()||last.getFullYear()!==now.getFullYear()){
    await sb.from("usage").update({episodes_used:0,updated_at:now.toISOString()}).eq("user_id",userId);
  }
};

// ── Auth Screen ────────────────────────────────────────────────────────────

    if(!email.trim()||(!password.trim()&&mode!=="reset")) return;
    setBusy(true); setMsg({text:"",ok:false});
    try {
      if(mode==="login"){
        const{data,error}=await sb.auth.signInWithPassword({email,password});
        if(error)throw new Error(error.message);
        onAuth(data.user);
      } else if(mode==="signup"){
        const{data,error}=await sb.auth.signUp({email,password});

        if(data?.user){

        const{error}=await sb.auth.resetPasswordForEmail(email);

          <div style={{fontSize:"24px",fontWeight:"700",color:T.tx,marginBottom:"6px"}}>استوديو البودكاست</div>
          <div style={{color:T.tx2,fontSize:"13px"}}>من الفكرة إلى النشر</div>

            {mode==="login"?"تسجيل الدخول":mode==="signup"?"إنشاء حساب جديد":"استعادة كلمة المرور"}
          </div>
          <div style={{color:T.tx2,fontSize:"12px",marginBottom:"24px"}}>
            {mode==="login"?"أدخل بياناتك للمتابعة":mode==="signup"?"أنشئ حسابك مجاناً":"سنرسل رابط الاستعادة لبريدك"}

// ── Create Screen ──────────────────────────────────────────────────────────
const CreateScreen = ({onEpReady,onNav,user}) => {
  const [step,setStep]=useState(0);
  const [name,setName]=useState("");
  const [type,setType]=useState("");
  const [duration,setDuration]=useState("");
  const [frequency,setFrequency]=useState("");
  const [topic,setTopic]=useState("");
  const [hostCount,setHostCount]=useState(2);
  const [script,setScript]=useState("");
  const [busy,setBusy]=useState(false);
  const [usage,setUsage]=useState(null);

  useEffect(()=>{
    if(!user)return;
    resetIfNewMonth(user.id).then(()=>getUsage(user.id).then(setUsage));
  },[user]);

  const cfg = type?TYPES[type]:{color:T.acc};

  const buildPrompt=()=>{
    const h=`البودكاست: "${name}" | النوع: ${TYPES[type].label} | المدة: ${duration} | النشر: ${frequency}${styleBlock()}\n\n`;
    if(type==="solo")return h+`الموضوع: ${topic}\n\nاكتب سكريبت كامل جاهز للتسجيل مباشرةً:\n١- مقدمة جذابة كاملة\n٢- عرض الموضوع بتفصيل مع انتقالات طبيعية\n٣- تعمق في كل نقطة مع أمثلة وقصص\n٤- خاتمة قوية مع call to action\nضع [توقف] عند الانتقالات. الطول يتناسب مع ${duration}.`;
    if(type==="group"){const n=hostCount||2,names=["م١","م٢","م٣","م٤","م٥"].slice(0,n).join("، ");return h+`الموضوع: ${topic}\nعدد المذيعين: ${n}\n\nاكتب سكريبت حوار جماعي كامل موزع على (${names}). كل جملة مكتوبة كاملاً. يشمل مقدمة وحوار متدفق مع نقاط توافق وخلاف وخاتمة. الطول يتناسب مع ${duration}.`;}
    return h+`الضيف/الموضوع: ${topic}\n\nاكتب قائمة أسئلة احترافية:\n١- ٣ أسئلة تمهيدية\n٢- ٦–٨ أسئلة جوهرية متدرجة\n٣- ٣ أسئلة استفزازية\n٤- سؤال ختامي مميز\nلكل سؤال: السؤال كاملاً + هدفه + أسئلة متابعة.`;
  };

  const generate=async()=>{
    if(!canGenerate(usage)){
      const plan=usage?.plan||"free";
      const credits=usage?.credits||0;
      setScript("UPGRADE");
      return;
    }
    setBusy(true);setScript("");
    try{
      const p1=buildPrompt()+"\n\nمهم: اكتب الجزء الأول فقط — المقدمة وأول نصف الموضوع. توقف عند منتصف الحلقة تقريباً وضع في النهاية: [يتبع...]";
      const part1=await callAI("أنت خبير بودكاست عربي. تكتب سكريبتات كاملة جاهزة للتسجيل. إذا وُجد ملف أسلوب، التزم به في كل جملة. ردودك بالعربية.",p1);
      const p2=`هذا هو الجزء الأول من السكريبت:\n\n${part1.replace("[يتبع...]","").trim()}\n\nمهم جداً: أنت تكمل سكريبت بودكاست صوتي. اكتب فقط النص المتبقي من السكريبت — الجزء الثاني من الموضوع والخاتمة. لا تكتب ملاحظات أو تعليقات أو تحليلات. فقط النص الجاهز للتسجيل مباشرةً بدون أي مقدمة.`;
      const part2=await callAI("أنت خبير بودكاست عربي. تكتب سكريبتات كاملة جاهزة للتسجيل. إذا وُجد ملف أسلوب، التزم به في كل جملة. ردودك بالعربية.",p2);
      const part3prompt = `هذا ما كُتب حتى الآن:\n\n${part1.replace("[يتبع...]","").trim()}\n\n${part2}\n\nأكمل الجزء الأخير — الخاتمة القوية مع call to action فقط إذا لم تكتب بعد. إذا كانت الخاتمة موجودة اكتب [مكتمل].`;
const part3 = await callAI("أنت خبير بودكاست عربي. ردودك بالعربية.", part3prompt);
const fullScript = part1.replace("[يتبع...]","").trim()+"\n\n"+part2+(part3.includes("[مكتمل]")?"":"\n\n"+part3);

      setScript(fullScript);
      const ep={id:Date.now()+"",name,type,duration,frequency,topic,hostCount,script:fullScript,createdAt:new Date().toISOString()};
      sEp(ep);onEpReady(ep);
      if(user){await incrementUsage(user.id,usage);setUsage(u=>u?{...u,episodes_used:(u.episodes_used||0)+1}:u);}
    }catch(e){setScript("خطأ: "+e.message);}
    setBusy(false);
  };

  const usageBar = usage ? (() => {
    const plan=usage.plan||"free";
    const limit=getEffectiveLimit(usage);
    const used=usage.episodes_used||0;
    const credits=usage.credits||0;
    const isBeta=plan==="beta";
    const betaExpired=isBeta&&usage.beta_expires_at&&new Date(usage.beta_expires_at)<new Date();
    const planLabel=betaExpired?"انتهت التجربة":isBeta?"تجربة مبكرة":plan==="pro"?"مدفوعة":"مجانية";
    const color=used>=limit?(credits>0?T.warn:T.err):T.acc;
    return(
      <div style={{marginBottom:"16px",padding:"10px 14px",borderRadius:"8px",background:T.sur,border:`1px solid ${T.brd}`,fontSize:"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          <span style={{color:T.tx2}}>الباقة:</span>
          <span style={{color:T.acc,fontWeight:"700"}}>{planLabel}</span>
          {credits>0&&<span style={{background:T.warn+"20",border:`1px solid ${T.warn}40`,borderRadius:"4px",padding:"1px 8px",color:T.warn,fontSize:"11px"}}>+{credits} كريديت</span>}
        </div>
        <span style={{color,fontWeight:"700"}}>{used}/{limit===Infinity?"∞":limit} حلقة هذا الشهر</span>
      </div>
    );
  })() : null;

  return (
    <div className="fade-in">
      <Dots cur={step} tot={3}/>
      {step===0&&(
        <div>
          <div style={{marginBottom:"24px"}}>
            <div style={{fontSize:"18px",fontWeight:"700",color:T.tx,marginBottom:"4px"}}>◎ هوية البودكاست</div>
            <div style={{color:T.tx2,fontSize:"13px"}}>ابدأ بتحديد اسم البودكاست وطبيعته</div>
          </div>
          <Field label="اسم البودكاست"><Input value={name} onChange={setName} placeholder="مثال: بودكاست مدى، صوت العقل..."/></Field>
          <div style={{fontSize:"11px",letterSpacing:"0.12em",color:T.tx2,textTransform:"uppercase",marginBottom:"12px"}}>نوع البودكاست</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"28px"}}>
            {Object.entries(TYPES).map(([k,t])=>{const sel=type===k;return(
              <div key={k} onClick={()=>setType(k)} style={{border:`2px solid ${sel?t.color:T.brd}`,borderRadius:"10px",padding:"16px 12px",cursor:"pointer",background:sel?t.color+"12":T.bg,transition:"all 0.2s",textAlign:"center"}}>
                <div style={{fontSize:"20px",marginBottom:"6px"}}>{t.icon}</div>
                <div style={{fontWeight:"700",fontSize:"13px",color:sel?t.color:T.tx,marginBottom:"3px"}}>{t.label}</div>
                <div style={{fontSize:"11px",color:T.tx2,lineHeight:"1.5"}}>{t.desc}</div>
              </div>
            );})}
          </div>
          <div style={{textAlign:"left"}}><Btn variant="fill" disabled={!name||!type} onClick={()=>setStep(1)}>التالي ←</Btn></div>
        </div>
      )}
      {step===1&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"22px"}}><Badge type={type}/><span style={{fontWeight:"700",color:T.tx}}>{name}</span></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px"}}>
            <Field label="مدة الحلقة"><Select value={duration} onChange={setDuration} options={DURS} placeholder="اختر المدة"/></Field>
            <Field label="تكرار النشر"><Select value={frequency} onChange={setFrequency} options={FREQS} placeholder="كم مرة؟"/></Field>
          </div>
          {type==="group"&&(<Field label="عدد المذيعين"><div style={{display:"flex",gap:"8px"}}>{[2,3,4,5].map(n=>(<div key={n} onClick={()=>setHostCount(n)} style={{border:`2px solid ${hostCount===n?cfg.color:T.brd}`,borderRadius:"8px",padding:"9px 16px",cursor:"pointer",fontWeight:"700",color:hostCount===n?cfg.color:T.tx2,background:hostCount===n?cfg.color+"15":"transparent"}}>{n}</div>))}</div></Field>)}
          <Field label={type==="solo"?"الموضوع أو الفكرة الكاملة":type==="group"?"موضوع النقاش وأبرز المحاور":"موضوع الحلقة وتفاصيل الضيف"}>
            <Textarea value={topic} onChange={setTopic} rows={5} placeholder={type==="solo"?"اكتب الفكرة بشكل موسع...":type==="group"?"ما الموضوع الذي ستناقشونه؟":"من الضيف؟ وما المحور؟"}/>
          </Field>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <Btn variant="outline" onClick={()=>setStep(0)}>← رجوع</Btn>
            <Btn variant="fill" disabled={!duration||!frequency||!topic} onClick={()=>setStep(2)}>توليد السكريبت ←</Btn>
          </div>
        </div>
      )}
      {step===2&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"5px"}}><Badge type={type}/><span style={{fontWeight:"700",color:T.tx,fontSize:"15px"}}>{name}</span></div>
          <div style={{color:T.tx2,fontSize:"12px",marginBottom:"16px"}}>{duration} · {frequency}</div>
          {usageBar}
          {!script&&!busy&&(
            <Card style={{textAlign:"center",padding:"44px 24px"}}>
              <div style={{fontSize:"36px",marginBottom:"12px"}}>{type==="solo"?"✦":type==="group"?"⬡":"◈"}</div>
              <div style={{fontWeight:"700",fontSize:"15px",color:T.tx,marginBottom:"6px"}}>جاهز لتوليد {type==="solo"?"السكريبت":type==="group"?"سكريبت الحوار":"أسئلة الحلقة"}</div>
              <div style={{color:T.tx2,fontSize:"12px",marginBottom:"24px"}}>{Object.keys(gStyle()).length?"سيتم الكتابة بأسلوبك الشخصي":"سيتم التوليد بناءً على معلوماتك"}</div>
              <Btn variant="fill" color={cfg.color} onClick={generate}>توليد المحتوى</Btn>
            </Card>
          )}
          {busy&&(<Card style={{textAlign:"center",padding:"44px 24px"}}><Spinner color={cfg.color}/><div style={{color:T.tx2,fontSize:"12px",marginTop:"8px"}}>يتم التوليد على جزأين للحصول على سكريبت أطول...</div></Card>)}
          {script==="UPGRADE"&&(
            <div style={{textAlign:"center",padding:"32px 24px",background:T.car,border:`1px solid ${T.brd}`,borderRadius:"12px",marginBottom:"16px"}}>
              <div style={{fontSize:"28px",marginBottom:"12px"}}>✦</div>
              <div style={{fontSize:"16px",fontWeight:"700",color:T.tx,marginBottom:"8px"}}>
                {(usage?.credits||0)===0?"وصلت للحد الأقصى":"لا يوجد رصيد كافٍ"}
              </div>
              <div style={{color:T.tx2,fontSize:"13px",marginBottom:"24px",lineHeight:"1.8"}}>
                {usage?.plan==="free"
                  ? `الباقة المجانية تتيح حلقة واحدة شهرياً.\nالباقة المدفوعة تتيح 4 حلقات بـ 39 ريال/شهر.`
                  : `يمكنك شراء حلقات إضافية بـ 1$ للحلقة كمشترك.`}
              </div>
              <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>
                <a href="https://podcaststudio.gumroad.com/l/pro" target="_blank" style={{display:"inline-block",background:T.acc,color:"#0d0d14",fontWeight:"700",fontSize:"14px",padding:"12px 24px",borderRadius:"8px",textDecoration:"none"}}>ترقية للمدفوعة ←</a>
                {usage?.plan==="pro"&&<a href="https://podcaststudio.gumroad.com/l/credit" target="_blank" style={{display:"inline-block",background:"transparent",color:T.acc,border:`1px solid ${T.acc}`,fontWeight:"700",fontSize:"14px",padding:"12px 24px",borderRadius:"8px",textDecoration:"none"}}>شراء حلقة إضافية (1$)</a>}
              </div>
            </div>
          )}
          {script&&script!=="UPGRADE"&&!busy&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                <div style={{fontSize:"11px",letterSpacing:"0.12em",color:T.tx2,textTransform:"uppercase"}}>السكريبت المولّد</div>
                <CopyBtn text={script}/>
              </div>
              <OutputBox text={script}/>
              <div style={{display:"flex",gap:"8px",marginTop:"12px",justifyContent:"flex-end"}}><Btn variant="outline" small onClick={generate}>إعادة التوليد</Btn></div>
              <NextBanner msg="السكريبت جاهز" sub="الخطوة التالية: نصائح الإنتاج" label="الإنتاج" onClick={()=>onNav("production")}/>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:"16px"}}>
            <Btn variant="outline" onClick={()=>setStep(1)}>← رجوع</Btn>
            <Btn variant="outline" onClick={()=>{setStep(0);setName("");setType("");setDuration("");setFrequency("");setTopic("");setScript("");}}>حلقة جديدة</Btn>
          </div>
        </div>
      )}
    </div>
  );
};

setBusy(false);

      <div style={{fontSize:"11px",letterSpacing:"0.12em",color:T.tx2,textTransform:"uppercase",marginBottom:"12px"}}>نوع الاستوديو</div>

// ── Marketing Screen ───────────────────────────────────────────────────────
const MarketingScreen = ({episode,onNav,usage}) => {
  const [link,setLink]=useState("");const [tab,setTab]=useState("description");const [outs,setOuts]=useState({});const [busy,setBusy]=useState("");const [dlDone,setDlDone]=useState(false);

    try{const text=await callAI("أنت خبير تسويق بودكاست عربي. ردودك بالعربية.",prompts[t]);setOuts(o=>({...o,[t]:text}));}catch(e){setOuts(o=>({...o,[t]:"خطأ: "+e.message}));}

const AdminScreen = ({onBack}) => {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [stats, setStats] = useState({free:0,pro:0,beta:0,total:0});
  const [editUser, setEditUser] = useState(null);
  const [editPlan, setEditPlan] = useState("");
  const [editCredits, setEditCredits] = useState("");
  const [editBetaDays, setEditBetaDays] = useState("30");
  const [editNotes, setEditNotes] = useState("");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState("");

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    setLoading(true);
    try {
      const { data: usageData } = await sb.from("usage").select("*");
      const { data: profileData } = await sb.from("profiles").select("*");

      const profileMap = {};
      (profileData||[]).forEach(p => { profileMap[p.id] = p; });

      const combined = (usageData||[]).map(u => ({
        ...u,
        profile: profileMap[u.user_id] || {},
      }));

      setUsers(combined);
      const s = {free:0,pro:0,beta:0,total:combined.length};
      combined.forEach(u => { if(u.plan==="pro")s.pro++; else if(u.plan==="beta")s.beta++; else s.free++; });
      setStats(s);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const openEdit = (u) => {
    setEditUser(u);
    setEditPlan(u.plan||"free");
    setEditCredits(u.credits||0);
    setEditNotes(u.notes||"");
    setEditBetaDays("30");
  };

  const saveEdit = async () => {
    if(!editUser) return;
    setSaving(true);
    try {
      const updates = { plan:editPlan, credits:parseInt(editCredits)||0, notes:editNotes, updated_at:new Date().toISOString() };
      if(editPlan==="beta"){
        const expires = new Date();
        expires.setDate(expires.getDate()+parseInt(editBetaDays||30));
        updates.beta_expires_at = expires.toISOString();
        updates.episodes_used = 0;
      }
      await sb.from("usage").update(updates).eq("user_id", editUser.user_id);
      setMsg("✓ تم الحفظ");
      setEditUser(null);
      await loadData();
      setTimeout(()=>setMsg(""),2000);
    } catch(e) { setMsg("خطأ: "+e.message); }
    setSaving(false);
  };

  const planColor = (plan) => plan==="pro"?T.ok:plan==="beta"?T.warn:T.tx3;
  const planLabel = (u) => {
    if(u.plan==="beta"){
      if(u.beta_expires_at){
        const exp=new Date(u.beta_expires_at);
        if(exp<new Date())return"beta (منتهية)";
        const days=Math.ceil((exp-new Date())/(1000*60*60*24));
        return`beta (${days} يوم)`;
      }
      return "beta";
    }
    return u.plan||"free";
  };

  return (
    <div style={{minHeight:"100vh",background:T.bg,padding:"24px 16px"}}>
      <div style={{maxWidth:"900px",margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"28px"}}>
          <div>
            <div style={{fontSize:"20px",fontWeight:"700",color:T.tx,marginBottom:"4px"}}>⚙ لوحة الأدمن</div>
            <div style={{color:T.tx2,fontSize:"13px"}}>إدارة المشتركين والباقات</div>
          </div>
          <Btn variant="outline" small onClick={onBack}>← رجوع</Btn>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px",marginBottom:"28px"}}>
          {[{l:"إجمالي المستخدمين",v:stats.total,c:T.acc},{l:"باقة مجانية",v:stats.free,c:T.tx2},{l:"باقة مدفوعة",v:stats.pro,c:T.ok},{l:"تجربة مبكرة",v:stats.beta,c:T.warn}].map(s=>(
            <Card key={s.l} style={{padding:"16px",textAlign:"center"}}>
              <div style={{fontSize:"28px",fontWeight:"800",color:s.c,marginBottom:"4px"}}>{s.v}</div>
              <div style={{fontSize:"11px",color:T.tx2}}>{s.l}</div>
            </Card>
          ))}
        </div>

        {msg && <Alert text={msg} type={msg.startsWith("✓")?"ok":"error"} />}

        {loading ? <Spinner/> : (
          <Card style={{padding:"0",overflow:"hidden"}}>
            <div style={{padding:"16px 20px",borderBottom:`1px solid ${T.brd}`,fontSize:"13px",fontWeight:"700",color:T.tx}}>المشتركون ({users.length})</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
                <thead>
                  <tr style={{borderBottom:`1px solid ${T.brd}`}}>
                    {["الاسم","البريد","البودكاست","الباقة","الاستخدام","الكريديت","ملاحظات","إجراء"].map(h=>(
                      <th key={h} style={{padding:"10px 14px",color:T.tx2,textAlign:"right",fontWeight:"600",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {users.map(u=>(
                    <tr key={u.user_id} style={{borderBottom:`1px solid ${T.brd}`,transition:"background 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background=T.sur} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{padding:"12px 14px",color:T.tx,whiteSpace:"nowrap"}}>{u.profile.first_name||"—"} {u.profile.last_name||""}</td>
                      <td style={{padding:"12px 14px",color:T.tx2,direction:"ltr",textAlign:"left",fontSize:"11px"}}>{u.profile.email||u.user_id.slice(0,8)+"..."}</td>
                      <td style={{padding:"12px 14px",color:T.tx2,whiteSpace:"nowrap"}}>{u.profile.podcast_name||"—"}</td>
                      <td style={{padding:"12px 14px",whiteSpace:"nowrap"}}><span style={{color:planColor(u.plan),fontWeight:"700"}}>{planLabel(u)}</span></td>
                      <td style={{padding:"12px 14px",color:T.tx2,textAlign:"center"}}>{u.episodes_used||0}/{getEffectiveLimit(u)===Infinity?"∞":getEffectiveLimit(u)}</td>
                      <td style={{padding:"12px 14px",color:T.acc,textAlign:"center",fontWeight:"700"}}>{u.credits||0}</td>
                      <td style={{padding:"12px 14px",color:T.tx2,maxWidth:"120px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.notes||"—"}</td>
                      <td style={{padding:"12px 14px"}}><div style={{display:"flex",gap:"6px"}}>   <Btn small variant="outline" onClick={()=>openEdit(u)}>تعديل</Btn>   <Btn small variant="outline" color={T.err} onClick={async()=>{     if(!confirm(`حذف ${u.profile.first_name}؟`))return;     await sb.from("usage").delete().eq("user_id",u.user_id);     await sb.from("profiles").delete().eq("id",u.user_id);     await loadData();   }}>حذف</Btn> </div></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        )}
      </div>

      {/* Edit Modal */}
      {editUser && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:"16px"}}>
          <Card style={{width:"100%",maxWidth:"420px",padding:"28px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
              <div style={{fontSize:"16px",fontWeight:"700",color:T.tx}}>تعديل المستخدم</div>
              <button onClick={()=>setEditUser(null)} style={{background:"none",border:"none",color:T.tx2,fontSize:"18px",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{color:T.tx2,fontSize:"12px",marginBottom:"20px"}}>{editUser.profile.first_name} {editUser.profile.last_name} — {editUser.profile.podcast_name||"بدون اسم بودكاست"}</div>

            {editPlan==="beta" && (

                <Input value={editBetaDays} onChange={setEditBetaDays} placeholder="30"/>
              </Field>
            )}
            <Field label="الكريديت الإضافي">
              <Input value={editCredits} onChange={setEditCredits} placeholder="0"/>

              <Textarea value={editNotes} onChange={setEditNotes} placeholder="ملاحظات داخلية..." rows={2}/>

        </div>

  );

  sb.from("settings").select("value").eq("key","maintenance").single().then(({data})=>{
    if(data?.value==="true"){
      document.body.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d0d14;font-family:'Noto Kufi Arabic',sans-serif;direction:rtl;text-align:center;padding:24px"><div><div style="font-size:48px;margin-bottom:20px">🔧</div><div style="font-size:24px;font-weight:700;color:#e2ddd4;margin-bottom:12px">الموقع تحت الصيانة</div><div style="font-size:15px;color:#8a8599;max-width:400px;line-height:1.8">نعمل على تحسين الأداة. سنعود قريباً إن شاء الله.</div><div style="margin-top:24px;font-size:12px;color:#4a4860">mypcstudio.com</div></div></div>`;
    }
  });
},[]);
 
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      const u=data.session?.user||null;
      setUser(u);
      if(u) loadProfile(u.id);
      else setAuthLoading(false);
    });
    const {data:listener}=sb.auth.onAuthStateChange((_,session)=>{
      const u=session?.user||null;
      setUser(u);
      if(u) loadProfile(u.id);
      else { setProfile(null); setAuthLoading(false); }
    });
    return ()=>listener.subscription.unsubscribe();
  },[]);

  const loadProfile = async (userId) => {
    const{data}=await sb.from("profiles").select("*").eq("id",userId).single();
    setProfile(data||null);
   const{data:u}=await sb.from("usage").select("*").eq("user_id",userId).single();
setUsage(u||null);
    setAuthLoading(false);
  };

  const isAdmin = user?.email === ADMIN_EMAIL;

  if(authLoading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg}}><Spinner/></div>;
  if(!user) return <AuthScreen onAuth={setUser}/>;
  if(!profile||!profile.first_name) return <ProfileSetup user={user} onDone={p=>{setProfile(p);}}/>;
  if(showAdmin&&isAdmin) return <AdminScreen onBack={()=>setShowAdmin(false)}/>;

  const signOut=async()=>{await sb.auth.signOut();setUser(null);setProfile(null);};

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 14px"}}>
      {showStyle&&<StyleModal onClose={()=>setShowStyle(false)} onSave={()=>{const s=gStyle();setHasStyle(!!(s.tone||s.opening));}}/>}

      <div style={{width:"100%",maxWidth:"620px",marginBottom:"22px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{display:"inline-flex",alignItems:"center",gap:"7px",background:T.sur,border:`1px solid ${T.brd}`,borderRadius:"100px",padding:"4px 14px",marginBottom:"10px"}}>
              <div style={{width:"5px",height:"5px",borderRadius:"50%",background:T.acc,boxShadow:`0 0 6px ${T.acc}`}}/>
              <span style={{color:T.tx2,fontSize:"10px",letterSpacing:"0.13em"}}>PODCAST STUDIO</span>
            </div>
            <div style={{fontSize:"21px",fontWeight:"700",color:T.tx,marginBottom:"2px"}}>استوديو البودكاست</div>
            <div style={{color:T.tx2,fontSize:"12px"}}>مرحباً، {profile.first_name} {profile.last_name}</div>
            {profile.podcast_name&&<div style={{color:T.tx3,fontSize:"11px",marginTop:"2px"}}>🎙 {profile.podcast_name}</div>}
          </div>
          <div style={{display:"flex",gap:"8px",alignItems:"flex-start"}}>
            {isAdmin&&<button onClick={()=>setShowAdmin(true)} style={{background:T.sur,border:`1px solid ${T.brd}`,borderRadius:"10px",padding:"9px 13px",cursor:"pointer",color:T.tx2,fontFamily:"'Noto Kufi Arabic',sans-serif",fontWeight:"700",fontSize:"11px",textAlign:"center"}}><div style={{fontSize:"16px",marginBottom:"2px"}}>⚙</div><div>أدمن</div></button>}
            <button onClick={()=>setShowStyle(true)} style={{background:hasStyle?T.accL:T.sur,border:`1px solid ${hasStyle?T.acc:T.brd}`,borderRadius:"10px",padding:"9px 13px",cursor:"pointer",color:hasStyle?T.acc:T.tx2,fontFamily:"'Noto Kufi Arabic',sans-serif",fontWeight:"700",fontSize:"11px",textAlign:"center"}}>
              <div style={{fontSize:"17px",marginBottom:"2px"}}>✦</div><div>أسلوبي</div>
              <div style={{fontSize:"9px",marginTop:"2px",opacity:0.7}}>{hasStyle?"مفعّل":"غير مُعدّ"}</div>
            </button>
            <button onClick={signOut} style={{background:T.sur,border:`1px solid ${T.brd}`,borderRadius:"10px",padding:"9px 13px",cursor:"pointer",color:T.tx2,fontFamily:"'Noto Kufi Arabic',sans-serif",fontWeight:"700",fontSize:"11px",textAlign:"center"}}>
              <div style={{fontSize:"17px",marginBottom:"2px"}}>→</div><div>خروج</div>
            </button>
          </div>
        </div>
        {episode&&(<div style={{marginTop:"12px",background:T.sur,border:`1px solid ${T.brd}`,borderRadius:"8px",padding:"10px 14px",display:"flex",alignItems:"center",gap:"9px"}}><div style={{width:"6px",height:"6px",borderRadius:"50%",background:T.ok,flexShrink:0}}/><span style={{color:T.tx2,fontSize:"11px"}}>الحلقة الحالية:</span><span style={{fontWeight:"700",fontSize:"12px",color:T.tx}}>{episode.name}</span><Badge type={episode.type}/></div>)}
      </div>

      <div style={{width:"100%",maxWidth:"620px"}}>
        <div style={{background:T.sur,border:`1px solid ${T.brd}`,borderRadius:"16px",padding:"24px"}}>
          <Nav active={tab} onChange={setTab}/>
          {tab==="create"&&<CreateScreen onEpReady={setEpisode} onNav={setTab} user={user}/>}
          {tab==="production"&&<ProductionScreen episode={episode} onNav={setTab}/>}
          {tab==="marketing"&&<MarketingScreen episode={episode} onNav={setTab} usage={usage}/>}
          {tab==="episodes"&&<EpisodesScreen onLoad={ep=>{setEpisode(ep);setTab("create");}}/>}
        </div>
      </div>

      <div style={{color:T.tx3,fontSize:"10px",marginTop:"20px",textAlign:"center"}}>المحتوى المولد للاسترشاد والتعديل قبل النشر</div>
      <FeedbackButton user={user}/>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
