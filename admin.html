<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0d0d14!important;min-height:100vh;}
body{font-family:'Noto Kufi Arabic',sans-serif;direction:rtl;color:#e2ddd4;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:4px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeIn 0.3s ease forwards;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/babel">
const {useState,useEffect}=React;
const SB_URL="https://qawyirrrprjcklwxgzqu.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhd3lpcnJycHJqY2tsd3hnenF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDMxNDEsImV4cCI6MjA5MzcxOTE0MX0.y7TJ0WPiYXa5JwphGuYdj8O8B_D7eZz8Fo53H27j7O8";

const T={bg:"#0d0d14",sur:"#13131e",car:"#1a1a28",brd:"#252535",brd2:"#2e2e42",acc:"#c8a050",accL:"rgba(200,160,80,0.12)",tx:"#e2ddd4",tx2:"#8a8599",tx3:"#4a4860",ok:"#3d9e6f",warn:"#c8a050",err:"#c05040"};
const IS={width:"100%",background:T.bg,border:`1px solid ${T.brd}`,borderRadius:"8px",padding:"11px 14px",color:T.tx,fontFamily:"'Noto Kufi Arabic',sans-serif",fontSize:"14px",direction:"rtl",outline:"none",boxSizing:"border-box"};
const useIsMobile=()=>{const[m,setM]=useState(window.innerWidth<768);useEffect(()=>{const h=()=>setM(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return m;};
const Field=({label,children})=>(<div style={{marginBottom:"16px"}}><div style={{fontSize:"11px",letterSpacing:"0.12em",color:T.tx2,textTransform:"uppercase",marginBottom:"7px"}}>{label}</div>{children}</div>);
const Btn=({children,onClick,disabled,variant="ghost",color,full,small})=>{
  const v=variant==="fill"?{background:color||T.acc,border:"none",color:"#0d0d14"}:variant==="outline"?{background:"transparent",border:`1px solid ${color||T.brd2}`,color:color||T.tx2}:{background:T.car,border:`1px solid ${T.brd}`,color:T.tx2};
  return <button onClick={onClick} disabled={disabled} style={{...v,borderRadius:"8px",fontFamily:"'Noto Kufi Arabic',sans-serif",fontWeight:"700",fontSize:small?"12px":"14px",padding:small?"7px 14px":"11px 22px",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,width:full?"100%":"auto"}}>{children}</button>;
};
const Card=({children,style={}})=>(<div style={{background:T.car,border:`1px solid ${T.brd}`,borderRadius:"12px",padding:"20px",...style}}>{children}</div>);
const Spin=()=>(<div style={{textAlign:"center",padding:"48px"}}><div style={{width:"32px",height:"32px",border:`2px solid ${T.brd2}`,borderTop:`2px solid ${T.acc}`,borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 12px"}}/><div style={{color:T.tx2,fontSize:"13px"}}>جارٍ التحميل...</div></div>);
const Alrt=({text,type="error"})=>{const c=type==="ok"?T.ok:type==="warn"?T.warn:T.err;return <div style={{padding:"10px 14px",borderRadius:"8px",fontSize:"13px",marginBottom:"14px",background:c+"20",border:`1px solid ${c}40`,color:type==="ok"?T.ok:type==="warn"?"#e8c070":"#e07060"}}>{text}</div>;};
const PlanBadge=({plan,betaExpires})=>{
  const exp=plan==="beta"&&betaExpires&&new Date(betaExpires)<new Date();
  const cfg={free:{l:"مجانية",c:T.tx3,bg:"rgba(74,72,96,0.2)"},pro:{l:"مدفوعة",c:T.ok,bg:"rgba(61,158,111,0.15)"},pro2:{l:"احترافية",c:"#9060e0",bg:"rgba(144,96,224,0.15)"},beta:exp?{l:"beta منتهية",c:T.err,bg:"rgba(192,80,64,0.15)"}:{l:"تجربة مبكرة",c:T.warn,bg:"rgba(200,160,80,0.15)"}};
  const s=cfg[plan]||cfg.free;
  return <span style={{fontSize:"11px",fontWeight:"700",padding:"3px 10px",borderRadius:"5px",background:s.bg,color:s.c}}>{s.l}</span>;
};

const Login=({onLogin})=>{
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[busy,setBusy]=useState(false);const[err,setErr]=useState("");
  const go=async()=>{setBusy(true);setErr("");try{const{data,error}=await sb.auth.signInWithPassword({email,password:pw});if(error)throw new Error(error.message);if(data.user?.email!==ADMIN)throw new Error("ليس لديك صلاحية الوصول");onLogin(data.user);}catch(e){setErr(e.message);}setBusy(false);};
  return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:T.bg}}>
    <div style={{width:"100%",maxWidth:"380px"}} className="fade">
      <div style={{textAlign:"center",marginBottom:"32px"}}>
        <div style={{fontSize:"44px",marginBottom:"10px"}}>⚙</div>
        <div style={{fontSize:"22px",fontWeight:"700",color:T.tx,marginBottom:"4px"}}>لوحة الأدمن</div>
        <div style={{color:T.tx2,fontSize:"13px"}}>استوديو البودكاست</div>
      </div>
      <Card>
        {err&&<Alrt text={err}/>}
        <Field label="البريد الإلكتروني"><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@email.com" style={IS} onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.brd}/></Field>
        <Field label="كلمة المرور"><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" style={IS} onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.brd}/></Field>
        <Btn variant="fill" full disabled={!email||!pw||busy} onClick={go}>{busy?"جارٍ الدخول...":"دخول"}</Btn>
      </Card>
    </div>
  </div>);
};

const Dashboard=({user,onLogout})=>{
  const isMobile=useIsMobile();
  const[tab,setTab]=useState("overview");
  const[users,setUsers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[stats,setStats]=useState({total:0,free:0,pro:0,beta:0,episodes:0,credits:0});
  const[msg,setMsg]=useState({text:"",type:"ok"});
  const[search,setSearch]=useState("");
  const[filterPlan,setFilterPlan]=useState("");
  const[editUser,setEditUser]=useState(null);
  const[ef,setEf]=useState({});
  const[saving,setSaving]=useState(false);
  const[messages,setMessages]=useState([]);
const[msgsLoading,setMsgsLoading]=useState(false);
  const RESEND_KEY="re_EMoUR54g_BhTyfSzUCbvXEjWv6RAn53Qx";
const SHEETS_URL="https://script.google.com/macros/s/AKfycbw3XCJgd5pdzLY9Sz53HEdqm_emzyI4SZIRvwROdq8etCfNBLXwRCrrT4nEFgArlTGwiQ/exec";
  const[maintenance,setMaintenance]=useState(false);
  const[maintenanceBusy,setMaintenanceBusy]=useState(false);

  useEffect(()=>{load();loadSettings();loadMessages();},[]);

  const load=async()=>{
    setLoading(true);
    try{
      const{data:u}=await sb.from("usage").select("*");
      const{data:p}=await sb.from("profiles").select("*");
      const pm={};(p||[]).forEach(x=>{pm[x.id]=x;});
      const c=(u||[]).map(x=>({...x,profile:pm[x.user_id]||{}}));
      setUsers(c);
      const s={total:c.length,free:0,pro:0,beta:0,episodes:0,credits:0};
      c.forEach(x=>{if(x.plan==="pro")s.pro++;else if(x.plan==="beta")s.beta++;else s.free++;s.episodes+=(x.episodes_used||0);s.credits+=(x.credits||0);});
      setStats(s);
    }catch(e){flash("خطأ: "+e.message,"error");}
    setLoading(false);
  };

  const loadMessages=async()=>{
  setMsgsLoading(true);
  try{
    const r=await fetch(SHEETS_URL);
    const data=await r.json();
    setMessages(data||[]);
  }catch(e){flash("خطأ في تحميل الرسائل","error");}
  setMsgsLoading(false);
};
  const loadSettings=async()=>{
    const{data}=await sb.from("settings").select("*").eq("key","maintenance").single();
    if(data)setMaintenance(data.value==="true");
  };

  const toggleMaintenance=async()=>{
    setMaintenanceBusy(true);
    const newVal=!maintenance;
    await sb.from("settings").update({value:newVal?"true":"false",updated_at:new Date().toISOString()}).eq("key","maintenance");
    setMaintenance(newVal);
    flash(newVal?"✓ وضع الصيانة مفعّل":"✓ الموقع يعمل بشكل طبيعي","ok");
    setMaintenanceBusy(false);
  };

  const flash=(text,type="ok")=>{setMsg({text,type});setTimeout(()=>setMsg({text:"",type:"ok"}),3000);};

  const openEdit=u=>{setEditUser(u);setEf({plan:u.plan||"free",credits:u.credits||0,notes:u.notes||"",betaDays:"30",fn:u.profile.first_name||"",ln:u.profile.last_name||"",pn:u.profile.podcast_name||""});};

  const saveEdit=async()=>{
    if(!editUser)return;setSaving(true);
    try{
      const upd={plan:ef.plan,credits:parseInt(ef.credits)||0,notes:ef.notes,updated_at:new Date().toISOString()};
      if(ef.plan==="beta"){const exp=new Date();exp.setDate(exp.getDate()+parseInt(ef.betaDays||30));upd.beta_expires_at=exp.toISOString();upd.episodes_used=0;}
      await sb.from("usage").update(upd).eq("user_id",editUser.user_id);
      await sb.from("profiles").update({first_name:ef.fn,last_name:ef.ln,podcast_name:ef.pn,updated_at:new Date().toISOString()}).eq("id",editUser.user_id);
      flash("✓ تم الحفظ","ok");setEditUser(null);await load();
    }catch(e){flash("خطأ: "+e.message,"error");}setSaving(false);
  };

  const deleteUser=async u=>{
    if(!window.confirm(`حذف ${u.profile.first_name||"هذا المستخدم"}؟`))return;
    try{await sb.from("usage").delete().eq("user_id",u.user_id);await sb.from("profiles").delete().eq("id",u.user_id);flash("✓ تم الحذف","ok");await load();}
    catch(e){flash("خطأ: "+e.message,"error");}
  };

  const exportCSV=(type)=>{
    const list=type==="offers"?users.filter(u=>u.profile.accept_offers):users;
    const rows=type==="offers"?[["الاسم","البريد","البودكاست"]]:
      [["الاسم","البريد","البودكاست","الباقة","الاستخدام","الكريديت","الملاحظات","التسجيل"]];
    list.forEach(u=>{
      if(type==="offers")rows.push([`${u.profile.first_name||""} ${u.profile.last_name||""}`.trim(),u.profile.email||"",u.profile.podcast_name||""]);
      else rows.push([`${u.profile.first_name||""} ${u.profile.last_name||""}`.trim(),u.profile.email||"",u.profile.podcast_name||"",u.plan||"free",u.episodes_used||0,u.credits||0,u.notes||"",new Date(u.created_at).toLocaleDateString("ar-SA")]);
    });
    const csv=rows.map(r=>r.join(",")).join("\n");
    const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=type==="offers"?"offers.csv":"subscribers.csv";a.click();URL.revokeObjectURL(url);
    flash(`✓ تم تصدير ${list.length} سجل`,"ok");
  };

  const filtered=users.filter(u=>{
    const s=`${u.profile.first_name||""} ${u.profile.last_name||""} ${u.profile.email||""} ${u.profile.podcast_name||""}`.toLowerCase();
    return(!search||s.includes(search.toLowerCase()))&&(!filterPlan||u.plan===filterPlan);
  });

  const betaDays=u=>{if(u.plan!=="beta"||!u.beta_expires_at)return null;return Math.ceil((new Date(u.beta_expires_at)-new Date())/(864e5));};
  const StatCard=({ic,l,v,c})=>(<Card style={{padding:"18px"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}><span style={{fontSize:"22px"}}>{ic}</span><span style={{fontSize:"26px",fontWeight:"800",color:c||T.acc}}>{v}</span></div><div style={{fontSize:"12px",color:T.tx2}}>{l}</div></Card>);

  const TABS=[{id:"overview",l:"نظرة عامة",ic:"📊"},{id:"users",l:"المشتركون",ic:"👥"},{id:"messages",l:"الرسائل",ic:"💬"},{id:"email",l:"إرسال إيميل",ic:"📧"},{id:"export",l:"تصدير",ic:"📤"},{id:"settings",l:"الإعدادات",ic:"⚙️"}];

  const MessagesTab=()=>(
  <div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"24px"}}>
      <div>
        <div style={{fontSize:"22px",fontWeight:"700",color:T.tx,marginBottom:"4px"}}>💬 رسائل التواصل</div>
        <div style={{color:T.tx2,fontSize:"13px"}}>{messages.length} رسالة</div>
      </div>
      <Btn small variant="outline" onClick={loadMessages}>↻ تحديث</Btn>
    </div>
    {msgsLoading?<Spin/>:messages.length===0?(
      <Card style={{textAlign:"center",padding:"40px"}}>
        <div style={{fontSize:"28px",marginBottom:"10px"}}>💬</div>
        <div style={{color:T.tx2,fontSize:"14px"}}>لا توجد رسائل بعد</div>
      </Card>
    ):(
      <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
        {messages.map((m,i)=>(
          <Card key={i} style={{padding:"18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
              <div>
                <div style={{fontWeight:"700",color:T.tx,fontSize:"14px",marginBottom:"3px"}}>{m["الاسم"]||"—"}</div>
                <div style={{color:T.tx2,fontSize:"11px",direction:"ltr",textAlign:"right"}}>{m["البريد"]||"—"}</div>
              </div>
              <div style={{fontSize:"11px",color:T.tx3,whiteSpace:"nowrap"}}>{m["التاريخ"]||""}</div>
            </div>
            <div style={{background:T.bg,borderRadius:"8px",padding:"12px",fontSize:"13px",color:T.tx,lineHeight:"1.7",border:`1px solid ${T.brd}`}}>{m["الرسالة"]||"—"}</div>
          </Card>
        ))}
      </div>
    )}
  </div>
);
  const EmailTab=()=>{
  useEffect(()=>{if(!users.length)load();},[]);
  const[subject,setSubject]=useState("");
  const[body,setBody]=useState("");
  const[audience,setAudience]=useState("all");
  const[preview,setPreview]=useState(false);
  const[sending,setSending]=useState(false);
  const[result,setResult]=useState({text:"",type:"ok"});

  const getRecipients=()=>{
    switch(audience){
      case "free": return users.filter(u=>u.plan==="free"&&u.profile.email);
      case "pro": return users.filter(u=>u.plan==="pro"&&u.profile.email);
      case "pro2": return users.filter(u=>u.plan==="pro2"&&u.profile.email);
      case "beta": return users.filter(u=>u.plan==="beta"&&u.profile.email);
      case "offers": return users.filter(u=>u.profile.accept_offers&&u.profile.email);
      default: return users.filter(u=>u.profile.email);
    }
  };

  const buildHTML=(name,bodyText)=>`
    <div dir="rtl" style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;background:#0d0d14;color:#e2ddd4;padding:40px 24px;border-radius:12px;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-size:28px;margin-bottom:8px;">🎙️</div>
        <div style="font-size:20px;font-weight:700;color:#c8a050;">استوديو البودكاست</div>
      </div>
      <p style="font-size:16px;margin-bottom:20px;">مرحباً ${name}،</p>
      <div style="font-size:14px;color:#8a8599;line-height:2;white-space:pre-wrap;">${bodyText}</div>
      <div style="margin-top:32px;text-align:center;">
        <a href="https://www.mypcstudio.com" style="display:inline-block;background:#c8a050;color:#0d0d14;font-weight:700;font-size:14px;padding:12px 28px;border-radius:8px;text-decoration:none;">افتح الأداة ←</a>
      </div>
      <p style="font-size:11px;color:#4a4860;text-align:center;margin-top:24px;">استوديو البودكاست · mypcstudio.com</p>
    </div>
  `;

  const send=async()=>{
    if(!subject.trim()||!body.trim())return;
    const recipients=getRecipients();
    if(!recipients.length){setResult({text:"لا يوجد مستخدمون في هذه الفئة",type:"error"});return;}
    if(!window.confirm(`إرسال لـ ${recipients.length} مستخدم؟`))return;
    setSending(true);setResult({text:"",type:"ok"});
    let sent=0;
    for(const u of recipients){
      const name=u.profile.first_name||"عزيزي المستخدم";
      try{
        await fetch("https://api.resend.com/emails",{
          method:"POST",
          headers:{"Authorization":`Bearer ${RESEND_KEY}`,"Content-Type":"application/json"},
          body:JSON.stringify({
            from:"استوديو البودكاست <hello@mypcstudio.com>",
            to:u.profile.email,
            subject,
            html:buildHTML(name,body),
          }),
        });
        sent++;
      }catch{}
    }
    setResult({text:`✓ تم الإرسال لـ ${sent} مستخدم`,type:"ok"});
    setSending(false);
  };

  const recipients=getRecipients();

  return(
    <div className="fade">
      <div style={{marginBottom:"28px"}}>
        <div style={{fontSize:"22px",fontWeight:"700",color:T.tx,marginBottom:"4px"}}>📧 إرسال إيميل</div>
        <div style={{color:T.tx2,fontSize:"13px"}}>أرسل إيميلاً منسقاً لمجموعة من المشتركين</div>
      </div>
      {result.text&&<Alrt text={result.text} type={result.type}/>}
      <div style={{display:"grid",gridTemplateColumns:preview?"1fr 1fr":"1fr",gap:"20px"}}>
        <div>
          <Card style={{marginBottom:"16px"}}>
           <Field label="الجمهور المستهدف">
  <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
    {[
      {v:"all",l:`الكل (${users.filter(u=>u.profile.email).length})`},
      {v:"free",l:`مجانية (${users.filter(u=>u.plan==="free"&&u.profile.email).length})`},
      {v:"pro",l:`مدفوعة (${users.filter(u=>u.plan==="pro"&&u.profile.email).length})`},
      {v:"pro2",l:`احترافية (${users.filter(u=>u.plan==="pro2"&&u.profile.email).length})`},
      {v:"beta",l:`تجربة مبكرة (${users.filter(u=>u.plan==="beta"&&u.profile.email).length})`},
      {v:"offers",l:`وافقوا على العروض (${users.filter(u=>u.profile.accept_offers&&u.profile.email).length})`},
    ].map(o=>(
      <button key={o.v} onClick={()=>setAudience(o.v)} style={{
        padding:"8px 14px",borderRadius:"8px",cursor:"pointer",fontSize:"12px",fontWeight:"600",
        fontFamily:"'Noto Kufi Arabic',sans-serif",
        background:audience===o.v?T.accL:"transparent",
        border:`1px solid ${audience===o.v?T.acc:T.brd2}`,
        color:audience===o.v?T.acc:T.tx2,
        transition:"all 0.2s",
      }}>{o.l}</button>
    ))}
  </div>
</Field>
            <div style={{padding:"10px 14px",borderRadius:"8px",background:T.bg,border:`1px solid ${T.brd}`,fontSize:"12px",color:T.tx2,marginBottom:"16px"}}>
              سيُرسَل لـ <strong style={{color:T.acc}}>{recipients.length} مستخدم</strong>
            </div>
            <Field label="عنوان الإيميل">
              <input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="مثال: تحديث جديد في الأداة 🎙️" style={IS} onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.brd}/>
            </Field>
            <Field label="نص الرسالة">
              <textarea value={body} onChange={e=>setBody(e.target.value)} rows={10} placeholder="اكتب رسالتك هنا...&#10;&#10;يمكنك استخدام أسطر متعددة للتنسيق." style={{...IS,resize:"vertical"}} onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.brd}/>
            </Field>
            <div style={{display:"flex",gap:"10px"}}>
              <Btn variant="outline" onClick={()=>setPreview(!preview)}>{preview?"إخفاء المعاينة":"معاينة الإيميل"}</Btn>
              <Btn variant="fill" disabled={!subject.trim()||!body.trim()||sending||!recipients.length} onClick={send} full>
                {sending?`جارٍ الإرسال...`:`إرسال لـ ${recipients.length} مستخدم ←`}
              </Btn>
            </div>
          </Card>
        </div>
        {preview&&(
          <div>
            <div style={{fontSize:"12px",color:T.tx2,marginBottom:"10px",fontWeight:"700"}}>معاينة الإيميل:</div>

                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
                    <thead><tr style={{background:T.sur,borderBottom:`1px solid ${T.brd}`}}>{["الاسم","البريد","البودكاست","الباقة","استخدام","كريديت","beta","ملاحظات","إجراء"].map(h=>(<th key={h} style={{padding:"12px 14px",color:T.tx2,textAlign:"right",fontWeight:"600",whiteSpace:"nowrap"}}>{h}</th>))}</tr></thead>
                    <tbody>{filtered.map(u=>{const d=betaDays(u);return(<tr key={u.user_id} style={{borderBottom:`1px solid ${T.brd}`,transition:"background 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background=T.sur} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{padding:"11px 14px",color:T.tx,whiteSpace:"nowrap"}}>{u.profile.first_name||"—"} {u.profile.last_name||""}</td>
                      <td style={{padding:"11px 14px",color:T.tx2,direction:"ltr",textAlign:"left",fontSize:"11px"}}>{u.profile.email||u.user_id.slice(0,12)+"..."}</td>
                      <td style={{padding:"11px 14px",color:T.tx2,maxWidth:"110px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.profile.podcast_name||"—"}</td>
                      <td style={{padding:"11px 14px"}}><PlanBadge plan={u.plan} betaExpires={u.beta_expires_at}/></td>
                      <td style={{padding:"11px 14px",color:T.tx2,textAlign:"center"}}>{u.episodes_used||0}</td>
                      <td style={{padding:"11px 14px",color:T.acc,textAlign:"center",fontWeight:"700"}}>{u.credits||0}</td>
                      <td style={{padding:"11px 14px",textAlign:"center"}}>{d!==null?<span style={{color:d<3?T.err:d<7?T.warn:T.ok,fontSize:"11px",fontWeight:"700"}}>{d>0?d+" يوم":"منتهية"}</span>:"—"}</td>
                      <td style={{padding:"11px 14px",color:T.tx2,maxWidth:"100px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.notes||"—"}</td>
                      <td style={{padding:"11px 14px"}}><div style={{display:"flex",gap:"6px"}}><Btn small variant="outline" onClick={()=>openEdit(u)}>✏️</Btn><Btn small variant="outline" color={T.err} onClick={()=>deleteUser(u)}>🗑</Btn></div></td>
                    </tr>);})}
                    </tbody>
                  </table>
                </div>
              </Card>
            )}
          </div>
        )}
        {tab==="export"&&(
          <div className="fade">
            <div style={{marginBottom:"28px"}}><div style={{fontSize:"22px",fontWeight:"700",color:T.tx,marginBottom:"4px"}}>تصدير البيانات</div><div style={{color:T.tx2,fontSize:"13px"}}>تصدير وإحصاءات المشتركين</div></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px",marginBottom:"20px"}}>
              <Card><div style={{fontSize:"28px",marginBottom:"10px"}}>📊</div><div style={{fontSize:"15px",fontWeight:"700",color:T.tx,marginBottom:"8px"}}>تصدير كل المشتركين</div><div style={{fontSize:"13px",color:T.tx2,marginBottom:"20px",lineHeight:"1.7"}}>ملف CSV يشمل كل البيانات.</div><Btn variant="fill" onClick={()=>exportCSV("all")}>⬇ تصدير CSV</Btn></Card>
              <Card><div style={{fontSize:"28px",marginBottom:"10px"}}>📧</div><div style={{fontSize:"15px",fontWeight:"700",color:T.tx,marginBottom:"8px"}}>قائمة العروض</div><div style={{fontSize:"13px",color:T.tx2,marginBottom:"20px",lineHeight:"1.7"}}>من وافقوا على استقبال العروض فقط.</div><Btn variant="fill" onClick={()=>exportCSV("offers")}>⬇ تصدير قائمة العروض</Btn></Card>
            </div>
            <Card><div style={{fontSize:"14px",fontWeight:"700",color:T.tx,marginBottom:"16px"}}>📋 ملخص إحصائي</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px"}}>
                {[{l:"إجمالي",v:stats.total},{l:"مجانية",v:stats.free},{l:"مدفوعة",v:stats.pro},{l:"تجربة مبكرة",v:stats.beta},{l:"وافقوا على العروض",v:users.filter(u=>u.profile.accept_offers).length},{l:"لديهم بودكاست",v:users.filter(u=>u.profile.podcast_name).length},{l:"حلقات مولّدة",v:stats.episodes},{l:"كريديت متبقٍ",v:stats.credits}].map(s=>(<div key={s.l} style={{background:T.bg,borderRadius:"8px",padding:"14px",border:`1px solid ${T.brd}`}}><div style={{fontSize:"24px",fontWeight:"800",color:T.acc,marginBottom:"4px"}}>{s.v}</div><div style={{fontSize:"11px",color:T.tx2}}>{s.l}</div></div>))}
              </div>
            </Card>
          </div>
        )}
        {tab==="messages"&&<MessagesTab/>}
        {tab==="email"&&<EmailTab/>}
        {tab==="settings"&&<SettingsTab/>}
        <EditModal/>
      </div>
    </div>
  );
};

const App=()=>{
  const[user,setUser]=useState(null);const[loading,setLoading]=useState(true);
  useEffect(()=>{sb.auth.getSession().then(({data})=>{const u=data.session?.user||null;if(u&&u.email===ADMIN)setUser(u);setLoading(false);});},[]);
  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg}}><Spin/></div>;
  if(!user)return <Login onLogin={setUser}/>;
  return <Dashboard user={user} onLogout={()=>setUser(null)}/>;
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
